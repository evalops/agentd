name: Codex Rails

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".agents/skills/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/codex-rails-check.yml"

permissions:
  contents: read

jobs:
  validate:
    uses: evalops/.github/.github/workflows/codex-rails-check.yml@a51e5155fa81f5722475a390c4110362167c821c
    with:
      require_agents: true
