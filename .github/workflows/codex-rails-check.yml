name: Codex Rails

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "**/AGENTS.md"
      - ".agents/skills/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/codex-rails-check.yml"

permissions:
  contents: read

jobs:
  validate:
    uses: evalops/.github/.github/workflows/codex-rails-check.yml@ec91f80b667b8b672f5db3f2300d05c30475dfc4
    with:
      require_agents: true
