name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Swift 6 toolchain
        run: |
          set -euo pipefail
          for xcode in \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode.app
          do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode"
              break
            fi
          done
          swift --version

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test

      - name: Lint Swift formatting
        run: xcrun swift-format lint --strict --recursive Sources Tests Package.swift

      - name: Package hardened app bundle
        run: scripts/package_app.sh
